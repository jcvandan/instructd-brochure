<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XPGR9XLWZX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-XPGR9XLWZX");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} | instructd.{% else %}instructd. | Online Intake & Client Portals for UK Law Firms{% endif %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ 'favicon.svg' | relative_url }}" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://instructd.co.uk/" />
    <meta property="og:title" content="Instructd | Online Intake & Client Portals for UK Law Firms" />
    <meta property="og:description" content="Give your clients the experience they expect. Cut your intake costs. Instructd lets clients complete intake online — anytime, on any device — with a portal to track their case." />
    <meta property="og:image" content="https://instructd.co.uk/img/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://instructd.co.uk/" />
    <meta name="twitter:title" content="Instructd | Online Intake & Client Portals for UK Law Firms" />
    <meta name="twitter:description" content="Give your clients the experience they expect. Cut your intake costs. Instructd lets clients complete intake online — anytime, on any device — with a portal to track their case." />
    <meta name="twitter:image" content="https://instructd.co.uk/img/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ 'styles.css' | relative_url }}" />
    <link rel="alternate" type="application/rss+xml" title="Instructd blog" href="{{ '/feed.xml' | relative_url }}" />
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <a href="{{ '/' | relative_url }}" class="logo"><img src="{{ 'img/logo.svg' | relative_url }}" alt="instructd." /></a>
        <div class="nav-links">
          <a href="{{ '/' | relative_url }}#what">What We Do</a>
          <a href="{{ '/' | relative_url }}#problem">Challenges</a>
          <a href="{{ '/' | relative_url }}#solution">Our Platform</a>
          <a href="{{ '/' | relative_url }}#features">Features</a>
          <a href="{{ '/' | relative_url }}#how">How It Works</a>
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="https://admin.instructd.co.uk" class="btn btn-primary">Login</a>
        </div>
      </div>
    </nav>

    {{ content }}

    <footer>
      <div class="footer-container">
        <a href="{{ '/' | relative_url }}" class="footer-logo">instructd<span>.</span></a>
        <span class="footer-text">© 2025 Instructd Ltd. All rights reserved.</span>
        <div class="footer-links">
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
          <a href="mailto:hello@instructd.co.uk">Contact</a>
        </div>
      </div>
    </footer>

    <script>
      document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
        anchor.addEventListener("click", function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute("href"));
          if (target) {
            target.scrollIntoView({
              behavior: "smooth",
              block: "start",
            });
          }
        });
      });

      window.addEventListener("scroll", () => {
        const nav = document.querySelector("nav");
        if (window.scrollY > 50) {
          nav.style.background = "rgba(253, 252, 250, 0.98)";
          nav.style.boxShadow = "0 2px 20px rgba(26, 43, 74, 0.08)";
        } else {
          nav.style.background = "rgba(253, 252, 250, 0.9)";
          nav.style.boxShadow = "none";
        }
      });

      const observerOptions = {
        threshold: 0.1,
        rootMargin: "0px 0px -50px 0px",
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = "1";
            entry.target.style.transform = "translateY(0)";
          }
        });
      }, observerOptions);

      document
        .querySelectorAll(
          ".feature-card, .pain-card, .usecase-card, .how-step, .diff-item, .pillar-card"
        )
        .forEach((el) => {
          el.style.opacity = "0";
          el.style.transform = "translateY(20px)";
          el.style.transition = "opacity 0.6s ease-out, transform 0.6s ease-out";
          observer.observe(el);
        });
    </script>
  </body>
</html>
